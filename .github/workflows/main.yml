name: Frontend CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    # Faz a configuração do Node
    - name: Setup do Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.14.0'

    # Roda testes usando o Jest previamente configurado para o projeto
    - name: Rodar Jest
      run: |
        cd app-front-odonto-manager
        npm i
        npm test -- --watchAll=false

    # Configura o Docker Buildx
    - name: Setup do Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Login no Docker Hub
    - name: Login no Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Build e Push para o Docker Hub
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./app-front-odonto-manager
        push: ${{ github.event_name != 'pull_request' }}
        tags: muryarth/app-front-odonto-manager:${{ github.ref_name }}-${{ github.sha }}
          
