name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'app-front-odonto-manager/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'app-front-odonto-manager/**'

jobs:

  # Build do frontend usando Node.js e Docker
  build-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    # Faz a configuração do Node
    - name: Setup do Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.14.0'

    # Roda testes usando o Jest previamente configurado para o projeto
    - name: Rodar Jest
      run: |
        cd app-front-odonto-manager
        npm i
        npm test -- --watchAll=false

    # Configura o Docker Buildx
    - name: Setup do Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Login no Docker Hub
    - name: Login no Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 1. Cria uma tag limpa e segura para o Docker
    # Obs.: vai trocar caracteres especiais por hífens para que o Docker aceite a tag
    - name: Preparar tag para Docker
      id: prep
      run: |
        TAG=$(echo ${{ github.ref_name }} | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    # Build e Push para o Docker Hub
    - name: Build e Push da imagem do Docker
      uses: docker/build-push-action@v5
      with:
        context: ./app-front-odonto-manager
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/app-front-odonto-manager:${{ steps.prep.outputs.tag }}-${{ github.sha }}
          ${{ secrets.DOCKERHUB_USERNAME }}/app-front-odonto-manager:latest
