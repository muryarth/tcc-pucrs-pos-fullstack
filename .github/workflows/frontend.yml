name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'app-front-odonto-manager/**'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'app-front-odonto-manager/**'

jobs:

  # Build do frontend usando Node.js e Docker
  build-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    # Faz a configuração do Node
    - name: Setup do Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.14.0'

    # Roda testes usando o Jest previamente configurado para o projeto
    - name: Rodar Jest
      run: |
        cd app-front-odonto-manager
        npm i
        npm test

    # Configura dependências do Docker
    - name: Setup do Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Builda a imagem do Dockerfile
    - name: Build Docker Image
      run: |
        docker build -t front-test:latest ./app-front-odonto-manager
