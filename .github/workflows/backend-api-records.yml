name: Pipeline CI/CD do microserviço "API Records"

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'app-back-odonto-manager/api-records/**'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'app-back-odonto-manager/api-records/**'

jobs:

  # Teste de conexão com banco e build do microserviço
  build-api-records:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: odonto_test
          POSTGRES_USER: odonto
          POSTGRES_PASSWORD: odonto
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    # Configura o Java 21
    - name: Setup do Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Roda o teste de conexão com o banco
    - name: Testar conexão com banco
      working-directory: app-back-odonto-manager/api-records
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: odonto_test
        DB_USER: odonto
        DB_PASSWORD: odonto
      run: mvn test -Dtest=DatabaseConnectionTest -B

    # Configura o Docker Buildx
    - name: Setup do Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Login no Docker Hub
    - name: Login no Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Cria uma tag limpa e segura para o Docker
    - name: Preparar tag para Docker
      id: prep
      run: |
        TAG=$(echo ${{ github.ref_name }} | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    # Build e Push para o Docker Hub
    - name: Build e Push da imagem do Docker
      uses: docker/build-push-action@v5
      with:
        context: ./app-back-odonto-manager/api-records
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/app-back-odonto-manager-api-records:${{ steps.prep.outputs.tag }}-${{ github.sha }}
          ${{ secrets.DOCKERHUB_USERNAME }}/app-back-odonto-manager-api-records:latest
