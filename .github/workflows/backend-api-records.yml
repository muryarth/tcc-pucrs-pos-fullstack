name: Pipeline CI/CD do microserviço "API Records"

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'app-back-odonto-manager/api-records/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'app-back-odonto-manager/api-records/**'

jobs:

  # Teste de conexão com banco e build do microserviço
  build-api-records:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: odonto_test
          POSTGRES_USER: odonto
          POSTGRES_PASSWORD: odonto
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    # Configura o Java 21
    - name: Setup do Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Roda o teste de conexão com o banco
    - name: Testar conexão com banco
      working-directory: app-back-odonto-manager/api-records
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: odonto_test
        DB_USER: odonto
        DB_PASSWORD: odonto
      run: mvn test -Dtest=DatabaseConnectionTest -B

    # Configura credenciais AWS antes de chegar no step do CodeBuild, para que ele possa usar essas credenciais ao ser acionado
    - name: Configurar credenciais AWS
      if: github.ref == 'refs/heads/main'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # Aciona o CodeBuild para buildar e fazer push da imagem para o ECR
    - name: Acionar CodeBuild
      if: github.ref == 'refs/heads/main'
      uses: aws-actions/aws-codebuild-run-build@v1
      with:
        project-name: odonto-manager-api-records

    # Deploy no ECS — atualiza o service com a nova imagem
    - name: Deploy no ECS
      if: github.ref == 'refs/heads/main'
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: odonto-manager-api-records-task
        service: odonto-manager-api-records-service
        cluster: odonto-manager-cluster
        wait-for-service-stability: true

    # Push para o Docker Hub (apenas na develop)
    - name: Setup do Docker Buildx
      if: github.ref == 'refs/heads/develop'
      uses: docker/setup-buildx-action@v3

    - name: Login no Docker Hub
      if: github.ref == 'refs/heads/develop'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build e Push para o Docker Hub
      if: github.ref == 'refs/heads/develop'
      uses: docker/build-push-action@v5
      with:
        context: ./app-back-odonto-manager/api-records
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/odonto-manager-api-records:develop
